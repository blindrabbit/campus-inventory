services:
  backend:
    build: ./backend
    ports:
      - "8088:8000"
    volumes:
      - ./backend:/app
      - ./inventario.xlsx:/app/inventario.xlsx:ro
      - ./planilha.xlsx:/app/planilha.xlsx:ro
      - backend-modules:/app/node_modules
      - backend-dev-data:/app/.dev-data
    environment:
      DATABASE_URL: "file:./.dev-data/dev.db"
      NODE_ENV: "development"
      XLSX_PATH: "/app/planilha.xlsx"
      LDAP_URL: "ldap://SEU_SERVIDOR_LDAP:389"
      LDAP_BASE_DN: "OU=Usuarios,OU=SeuCampus,DC=seudominio,DC=br"
      LDAP_DOMAIN: "seudominio.br"
      LDAP_BIND_USER: "usuario.ldap"
      LDAP_BIND_PASS: "SUA_SENHA_LDAP"
      JWT_SECRET: "TROQUE_POR_UM_SECRET_SEGURO"
    command: ["pnpm", "dev"]

  frontend:
    build: ./frontend
    ports:
      - "3033:3000"
    volumes:
      - ./frontend:/app
      - frontend-modules:/app/node_modules
      - frontend-cache:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: "/api"
    command: ["pnpm", "dev"]
    depends_on:
      - backend

volumes:
  backend-modules:
  frontend-modules:
  frontend-cache:
  backend-dev-data:
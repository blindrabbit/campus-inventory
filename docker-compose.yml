services:
  backend:
    build: ./backend
    ports:
      - "8088:8000"
    volumes:
      - ./backend:/app
      - ./inventario.xlsx:/app/inventario.xlsx:ro
      - backend-modules:/app/node_modules
      - db-data:/app/data
    environment:
      DATABASE_URL: "file:/app/data/dev.db"
      NODE_ENV: "development"
      LDAP_URL: "ldap://172.16.112.2:389"
      LDAP_BASE_DN: "OU=Usuarios,OU=Campus Aracruz,DC=cefetes,DC=br"
      LDAP_DOMAIN: "cefetes.br"
      JWT_SECRET: "dev-secret-123-mude-em-producao"
    command: ["pnpm", "dev"]

  frontend:
    build: ./frontend
    ports:
      - "3033:3000"
    volumes:
      - ./frontend:/app
      - frontend-modules:/app/node_modules
      - frontend-cache:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: "/api"
    command: ["pnpm", "dev"]
    depends_on:
      - backend

volumes:
  backend-modules:
  frontend-modules:
  frontend-cache:
  db-data: